<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 365" font-family="'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="ah-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="365" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Machine à états · Cycle de vie d'une demande de commande</text>
  <text x="450" y="51" text-anchor="middle" font-size="11" fill="#6B7280">App\Enums\OrderStatus</text>

  <!-- Cancelable zone (dashed border, no fill) -->
  <rect x="12" y="66" width="698" height="70" rx="8" fill="white" fill-opacity="0.6" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Zone label on a white pill so it doesn't blend into the border -->
  <rect x="22" y="59" width="118" height="14" rx="3" fill="#F9FAFB"/>
  <text x="81" y="69" text-anchor="middle" font-size="9.5" fill="#9CA3AF">États annulables</text>

  <!-- Closed zone subtle highlight -->
  <rect x="756" y="66" width="132" height="70" rx="8" fill="none" stroke="#0891B2" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- ── STATE BOXES ── -->

  <!-- Sent · gray-500 -->
  <rect x="22" y="78" width="112" height="46" rx="8" fill="#6B7280"/>
  <text x="78" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Sent</text>
  <text x="78" y="113" text-anchor="middle" font-size="10" fill="#F3F4F6">Envoyée</text>

  <!-- Processing · amber-600 -->
  <rect x="202" y="78" width="128" height="46" rx="8" fill="#D97706"/>
  <text x="266" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Processing</text>
  <text x="266" y="113" text-anchor="middle" font-size="10" fill="#FEF3C7">En traitement</text>

  <!-- Ordered · emerald-600 -->
  <rect x="400" y="78" width="112" height="46" rx="8" fill="#059669"/>
  <text x="456" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Ordered</text>
  <text x="456" y="113" text-anchor="middle" font-size="10" fill="#D1FAE5">Commandée</text>

  <!-- Received · blue-600 -->
  <rect x="582" y="78" width="112" height="46" rx="8" fill="#2563EB"/>
  <text x="638" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Received</text>
  <text x="638" y="113" text-anchor="middle" font-size="10" fill="#DBEAFE">Reçue</text>

  <!-- Closed · cyan-600 (terminal) -->
  <rect x="764" y="78" width="112" height="46" rx="8" fill="#0891B2"/>
  <text x="820" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="white">Closed</text>
  <text x="820" y="113" text-anchor="middle" font-size="10" fill="#CFFAFE">Clôturée</text>
  <text x="820" y="136" text-anchor="middle" font-size="8.5" fill="#0891B2" font-style="italic">● terminal</text>

  <!-- Cancelled · red-600 (terminal) -->
  <rect x="291" y="252" width="130" height="46" rx="8" fill="#DC2626"/>
  <text x="356" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="white">Cancelled</text>
  <text x="356" y="287" text-anchor="middle" font-size="10" fill="#FEE2E2">Annulée</text>
  <text x="356" y="312" text-anchor="middle" font-size="8.5" fill="#DC2626" font-style="italic">● terminal</text>

  <!-- ── MAIN FLOW ARROWS (horizontal) ── -->

  <!-- Sent → Processing -->
  <line x1="134" y1="101" x2="200" y2="101" stroke="#374151" stroke-width="2" marker-end="url(#ah)"/>
  <!-- label above line -->
  <text x="167" y="89" text-anchor="middle" font-size="8" fill="#1F2937">processOrder</text>
  <text x="167" y="98" text-anchor="middle" font-size="7.5" fill="#6B7280">(admin)</text>

  <!-- Processing → Ordered -->
  <line x1="330" y1="101" x2="398" y2="101" stroke="#374151" stroke-width="2" marker-end="url(#ah)"/>
  <text x="364" y="89" text-anchor="middle" font-size="8" fill="#1F2937">markOrdered</text>
  <text x="364" y="98" text-anchor="middle" font-size="7.5" fill="#6B7280">(admin)</text>

  <!-- Ordered → Received -->
  <line x1="512" y1="101" x2="580" y2="101" stroke="#374151" stroke-width="2" marker-end="url(#ah)"/>
  <text x="546" y="89" text-anchor="middle" font-size="8" fill="#1F2937">markReceived</text>
  <text x="546" y="98" text-anchor="middle" font-size="7.5" fill="#6B7280">(admin)</text>

  <!-- Received → Closed -->
  <line x1="694" y1="101" x2="762" y2="101" stroke="#374151" stroke-width="2" marker-end="url(#ah)"/>
  <text x="728" y="89" text-anchor="middle" font-size="8" fill="#1F2937">closeOrder</text>
  <text x="728" y="98" text-anchor="middle" font-size="7.5" fill="#6B7280">(admin)</text>

  <!-- ── CANCEL ARROW (vertical dashed) ── -->
  <!-- From zone bottom center → Cancelled top -->
  <line x1="356" y1="136" x2="356" y2="250" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-red)"/>

  <!-- cancelOrder labels to the right of the arrow -->
  <text x="370" y="176" font-size="9" font-weight="600" fill="#DC2626">cancelOrder</text>
  <text x="370" y="190" font-size="8" fill="#6B7280">admin : tout état non terminal</text>
  <text x="370" y="202" font-size="8" fill="#6B7280">demandeur : statut Sent uniquement</text>

  <!-- ── LEGEND ── -->
  <rect x="12" y="328" width="876" height="26" rx="6" fill="#F3F4F6"/>
  <!-- main arrow sample -->
  <line x1="28" y1="341" x2="56" y2="341" stroke="#374151" stroke-width="2" marker-end="url(#ah)"/>
  <text x="63" y="345" font-size="9" fill="#374151">Transition nominale (rôle admin requis)</text>
  <!-- cancel arrow sample -->
  <line x1="290" y1="341" x2="318" y2="341" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah-red)"/>
  <text x="325" y="345" font-size="9" fill="#374151">Annulation (cancelOrder)</text>
  <!-- terminal note -->
  <text x="520" y="345" font-size="9" fill="#374151">● terminal = aucune transition possible</text>
</svg>
